{% extends "site_base.html" %}
{% block title %}Maktab — HomeEdu{% endblock %}

<p class="sub">1–11 sinf bo‘yicha fanlar.</p>

<div class="grid grid3" style="margin-top: 16px;">
  {% for g in grades %}

      <div style="font-weight:900; font-size: 18px;">{{ g }}</div>
      <div class="muted" style="margin-top:8px;">Fanlar →</div>

  {% endfor %}
</div>
{% endblock %}
