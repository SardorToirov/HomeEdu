{% extends "site_base.html" %}
{% block title %}{{ item.title }} — HomeEdu{% endblock %}
{% block content %}
<div class="row">
  <div>
    <h1 class="h1">{{ item.title }}</h1>
    <p class="sub">{{ item.description|linebreaks }}</p>
  </div>
  <a class="btn small" href="{% url 'parents:list' %}">← Ro‘yxat</a>
</div>

{% if item.video_file %}
  <div style="margin-top:16px; border-radius:16px; overflow:hidden; border:1px solid rgba(0,0,0,.10); background:#000;">
    <video controls preload="metadata"
           style="width:100%; display:block; max-height:520px; background:#000;">
      <source src="{{ item.video_file.url }}">
    </video>
  </div>
{% endif %}
{% endblock %}
